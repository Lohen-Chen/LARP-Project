<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr.Shay Math World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scanlines"></div>
  <div class="grain"></div>

  <main id="app">
    <!-- Hero/landing -->
    <section id="hero" class="hero">
      <div class="hero-stack">
        <!-- GPU chip glyph -->
        <svg class="gpu-chip" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="70"  y="20" width="10" height="40" />
          <rect x="95"  y="20" width="10" height="40" />
          <rect x="120" y="20" width="10" height="40" />
          <rect x="70"  y="140" width="10" height="40" />
          <rect x="95"  y="140" width="10" height="40" />
          <rect x="120" y="140" width="10" height="40" />
          <rect x="20"  y="70"  width="40" height="10" />
          <rect x="20"  y="95"  width="40" height="10" />
          <rect x="20"  y="120" width="40" height="10" />
          <rect x="140" y="70"  width="40" height="10" />
          <rect x="140" y="95"  width="40" height="10" />
          <rect x="140" y="120" width="40" height="10" />
          <rect x="60" y="60" width="80" height="80" rx="6" ry="6"
                fill="none" stroke="currentColor" stroke-width="8" />
          <text x="100" y="108" text-anchor="middle"
                font-family="VT323, monospace" font-size="34"
                fill="currentColor">GPU</text>
        </svg>

        <button id="start-btn" class="btn-start">
          <span class="btn-bracket">[</span><span class="btn-label">START</span><span class="btn-bracket">]</span>
        </button>
      </div>
    </section>

    <!-- Level view -->
    <section id="level-view" class="level-view hidden">
      <header class="level-topbar">
        <button id="back-btn" class="btn-back">&lt; HOME</button>
        <nav id="level-nav" class="level-nav"></nav>
        <span class="topbar-spacer"></span>
      </header>

      <div class="level-grid" id="level-grid">
        <!-- LEFT: tutorial pane (closable) -->
        <aside id="tutorial-pane" class="pane tutorial-pane">
          <button id="tutorial-close" class="pane-close" aria-label="Close tutorial">x</button>
          <div id="tutorial-content" class="tutorial-content"></div>
        </aside>

        <!-- Reopen tab — visible only when tutorial is collapsed -->
        <button id="tutorial-reopen" class="tutorial-reopen hidden" aria-label="Open tutorial">
          <span>TUTORIAL</span>
        </button>

        <!-- RIGHT: canvas on top, matrix input + console below -->
        <section class="right-column">
          <div class="pane canvas-pane">
            <div id="p5-host"></div>
          </div>

          <div class="bottom-row">
            <div class="pane matrix-pane">
              <div class="pane-title">MATRIX INPUT</div>
              <div id="controls" class="controls"></div>
            </div>
            <div class="pane console-pane">
              <div class="pane-title">OUTPUT CONSOLE</div>
              <div id="console" class="console"></div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="js/matrix.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/levels/level1.js"></script>
  <script src="js/levels/level2.js"></script>
  <script src="js/levels/level3.js"></script>
  <script src="js/levels/level4.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
